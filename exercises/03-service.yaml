apiVersion: v1
kind: Service
metadata:
  name: nginx-service
spec:
  selector:
    app: nginx          # Finds all Pods with this label and routes traffic to them
  ports:
    - port: 80          # Port the Service listens on
      targetPort: 80    # Port it forwards to inside the Pod
  type: ClusterIP       # Only accessible inside the cluster (by other Pods)
